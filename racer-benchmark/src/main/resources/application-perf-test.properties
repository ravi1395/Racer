# ─── Baseline Config (disable all cross-cutting features) ─────────────────────
# Start with every feature OFF so the first perf run establishes a clean baseline.
# Then enable them one at a time (see "Resilience Settings" section below) to
# measure the per-feature overhead.
racer.schema.enabled=false
racer.dedup.enabled=false
racer.circuit-breaker.enabled=false
racer.rate-limit.enabled=false
racer.tracing.enabled=false

# ─── Thread Pool Tuning ────────────────────────────────────────────────────────
racer.thread-pool.core-size=16
racer.thread-pool.max-size=64
racer.thread-pool.queue-capacity=5000
racer.thread-pool.keep-alive-seconds=60

# ─── Stream Consumer Tuning ───────────────────────────────────────────────────
racer.consumer.poll-batch-size=50
racer.consumer.poll-interval-ms=50
racer.consumer.concurrency=4
racer.consumer.block-millis=1000

# ─── Retention Tuning ─────────────────────────────────────────────────────────
racer.retention.stream-max-len=10000
racer.dlq.max-size=5000

# ─── Resilience Settings (enable one at a time for bottleneck isolation) ──────
#
# To isolate the dedup overhead:
# racer.dedup.enabled=true
# racer.dedup.ttl-seconds=300
#
# To isolate the circuit-breaker overhead:
# racer.circuit-breaker.enabled=true
# racer.circuit-breaker.sliding-window-size=10
# racer.circuit-breaker.failure-rate-threshold=50.0
#
# To isolate the rate-limiter overhead:
# racer.rate-limit.enabled=true
# racer.rate-limit.default-capacity=1000
# racer.rate-limit.default-refill-rate=100

# ─── Spring Boot / Webflux Tuning ─────────────────────────────────────────────
server.tomcat.threads.max=200
spring.webflux.max-in-memory-buffer-size=16777216

# ─── Logging (suppress noise during perf runs) ────────────────────────────────
logging.level.com.cheetah.racer=WARN
logging.level.root=WARN

# ─── Metrics (expose Prometheus endpoint for real-time monitoring) ─────────────
management.endpoints.web.exposure.include=metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=notify-hub
