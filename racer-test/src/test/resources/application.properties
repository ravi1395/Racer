# Prevent Spring Boot from attempting a Redis connection during test context startup.
# RacerTestAutoConfiguration's no-op stubs supply all required Redis infrastructure.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Suppress the Spring Boot banner to keep test output clean
spring.main.banner-mode=off

# Test channel configuration referenced by InMemoryRacerPublisherRegistryTest
# and RacerTestAutoConfigurationTest
racer.default-channel=racer:messages
racer.channels.orders.name=racer:orders
racer.channels.notifications.name=racer:notifications
